name: Scrape and Sync GPF NAV
on:
  schedule:
    # Run every day at 05:00 UTC (12:00 PM ICT/Thailand)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync_nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run Scraper Script
        run: npx tsx scripts/sync.ts
        env:
          # Note: The database connects directly via standard SDK. 
          # No secrets needed here since the rule only validates strict unauthenticated writes payload structure.
          NODE_ENV: production
